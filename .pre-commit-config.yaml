repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: check-meta-naming
        name: Check .meta/ filename taxonomy
        entry: python scripts/check_meta_naming.py
        language: system
        files: ^\.meta/(active|archive)/
      - id: check-git-author
        name: Reject commits authored by Claude/Anthropic
        entry: python scripts/check_git_author.py
        language: system
        always_run: true
        pass_filenames: false
      - id: check-coauthor-trailer
        name: Reject Co-authored-by Claude/Anthropic trailers
        entry: python scripts/check_git_author.py
        language: system
        stages: [commit-msg]
        pass_filenames: true
      - id: audit-public-safety-quick
        name: Quick secret scan on staged files
        entry: python scripts/audit_public_safety.py --mode=quick
        language: system
        pass_filenames: true
      - id: check-skills-contract
        name: Skills & agents trigger table ↔ filesystem contract
        entry: python scripts/check_skills_contract.py
        language: system
        pass_filenames: false
        always_run: true
      - id: sync-hosts
        name: Verify multi-host stubs are up-to-date
        entry: python scripts/sync_hosts.py --check
        language: system
        pass_filenames: false
        files: '\.claude/skills/|\.claude/agents/|CLAUDE\.md|sync-config\.yaml'
