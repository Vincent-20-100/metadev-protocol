<svg xmlns="http://www.w3.org/2000/svg" width="900" height="230" viewBox="0 0 900 230">
  <defs>
    <style>
      @font-face {
        font-family: 'PressStart2P';
        font-style: normal;
        font-weight: 400;
        src: url(data:font/woff2;base64,) format('woff2');
      }
      .t5a { font-family: 'PressStart2P', 'Courier New', monospace; font-size: 46px; fill: #1e66f5; }
      .t5b { font-family: 'PressStart2P', 'Courier New', monospace; font-size: 46px; fill: #74c7ec; }
      .t5c { font-family: 'PressStart2P', 'Courier New', monospace; font-size: 46px; fill: #b4d0ff; }
      .t5prompt { font-family: 'PressStart2P', 'Courier New', monospace; font-size: 46px; fill: #a6e3a1; }
    </style>
    <pattern id="scanlines" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="rgba(0,0,0,0.13)"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="55%" stop-color="#1e1e2e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.7"/>
    </radialGradient>
  </defs>

  <rect width="900" height="230" rx="14" fill="#1e2a52"/>

  <g filter="url(#glow)">
    <text x="28" y="138" class="t5prompt">&gt;</text>
    <text x="104" y="142" class="t5a">metadev-protocol</text>
    <text x="102" y="140" class="t5b">metadev-protocol</text>
    <text x="100" y="138" class="t5c">metadev-protocol</text>
    <rect x="848" y="108" width="22" height="36" fill="#f9e2af">
      <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <rect width="900" height="230" rx="14" fill="url(#scanlines)"/>
  <rect width="900" height="230" rx="14" fill="url(#vignette)"/>
  <rect x="8" y="8" width="884" height="214" rx="10" fill="none" stroke="#89b4fa" stroke-width="2" opacity="0.7"/>
</svg>
