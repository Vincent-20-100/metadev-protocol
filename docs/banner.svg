<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
      .title { font-family: 'Press Start 2P', 'Courier New', monospace; font-size: 42px; fill: #89b4fa; }
      .subtitle { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 16px; fill: #6c7086; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="260" rx="12" fill="#1e1e2e"/>

  <!-- Scanline effect -->
  <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
    <rect width="4" height="2" fill="rgba(0,0,0,0.08)"/>
  </pattern>
  <rect width="900" height="260" rx="12" fill="url(#scanlines)"/>

  <!-- Title — centered -->
  <text x="450" y="110" text-anchor="middle" class="title">metadev-protocol</text>

  <!-- Tagline — centered -->
  <text x="450" y="155" text-anchor="middle" class="subtitle">One command, your AI-ready Python project: automatisms, conventions, skills,</text>
  <text x="450" y="178" text-anchor="middle" class="subtitle">agents, secrets scanning, and session context. Premium vibe-coding out of the box.</text>
</svg>
