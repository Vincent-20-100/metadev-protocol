name: Public visibility alert
on:
  public:
jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      - id: audit
        continue-on-error: true
        run: uv run python scripts/audit_public_safety.py --mode=full
      - if: steps.audit.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[CRITICAL] Public visibility audit failed',
              body: [
                'The repository just transitioned to public visibility,',
                'but the safety audit detected violations.',
                '',
                '**Action required:**',
                '1. Review the failing workflow run above',
                '2. Consider reverting to private: `gh repo edit --visibility private`',
                '3. Remediate before re-publishing'
              ].join('\n'),
              labels: ['critical', 'security']
            })
