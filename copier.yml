# copier.yml — The Meta Protocol
# Project generator
# Usage: copier copy gh:Vincent-20-100/metadev-protocol my-new-project

# ─────────────────────────────────────────
# Init questions
# ─────────────────────────────────────────

project_name:
  type: str
  help: "Project name (e.g., egovault, price-tracker)"
  default: "my-project"

project_slug:
  type: str
  help: "Python package slug (snake_case, no hyphens)"
  default: "{{ project_name | lower | replace('-', '_') | replace(' ', '_') }}"

author_name:
  type: str
  help: "Your first name (for pyproject.toml and SessionStart git-author override)"
  default: "User"

author_email:
  type: str
  help: "Your email (for pyproject.toml and SessionStart git-author override in Claude Code remote)"
  default: "you@example.com"

python_version:
  type: str
  help: "Minimum Python version"
  default: "3.13"

meta_visibility:
  type: str
  help: "How visible should .meta/ be in git? (public = commit everything except drafts; private = gitignore entire .meta/)"
  choices:
    - public
    - private
  default: public

execution_mode:
  type: str
  help: "Claude Code permission preset. 'safe' asks before touching repo structure or running destructive commands (recommended default). 'full-auto' allows everything except a hard safety net — use only for unsupervised runs (VPS, overnight spec execution)."
  choices:
    - safe
    - full-auto
  default: safe

enable_server_auth_check:
  type: bool
  help: "Add a GitHub Actions workflow that blocks PRs containing Claude/Anthropic-authored commits? Recommended if you use cloud AI sandboxes or have external contributors."
  default: false

enable_multi_host:
  type: bool
  help: "Opt in to multi-LLM host coordination (Codex via AGENTS.md, Gemini via GEMINI.md, sync-config.yaml, sync_hosts.py, pre-commit hook H008, CI workflow). Default is Claude-only: none of these files are generated. Activate via `--data enable_multi_host=true` when needed."
  default: false
  when: false

# ─────────────────────────────────────────
# Copier configuration
# ─────────────────────────────────────────

_min_copier_version: "9.0.0"

_subdirectory: template

_exclude:
  - "*.pyc"
  - "__pycache__"
  - ".meta/drafts/*"
  - "!.meta/drafts/.gitkeep"
  - "{% if not enable_server_auth_check %}.github/workflows/check-commit-authors.yml{% endif %}"
  - "{% if not enable_multi_host %}AGENTS.md{% endif %}"
  - "{% if not enable_multi_host %}GEMINI.md{% endif %}"
  - "{% if not enable_multi_host %}sync-config.yaml{% endif %}"
  - "{% if not enable_multi_host %}scripts/sync_hosts.py{% endif %}"
  - "{% if not enable_multi_host %}.github/workflows/sync-hosts.yml{% endif %}"

_tasks:
  - "git init -b main"
  - "git symbolic-ref HEAD refs/heads/main"
  - >
    uv sync && uv run pre-commit install &&
    echo 'Dependencies installed, pre-commit activated.' ||
    echo 'uv not found or sync failed. Install uv then run: uv sync && uv run pre-commit install'

_message_after_copy: |

  ╔══════════════════════════════════════════════════════════╗
  ║                                                          ║
  ║   {{ project_name }}                                     ║
  ║   created with The Meta Protocol                         ║
  ║                                                          ║
  ╠══════════════════════════════════════════════════════════╣
  ║                                                          ║
  ║   Next steps:                                            ║
  ║     1. cd {{ project_slug }}                             ║
  ║     2. Open .meta/PILOT.md — set your first goal         ║
  ║     3. Launch: claude                                    ║
  ║                                                          ║
  ║   Stack     Python {{ python_version }} · uv · ruff      ║
  ║   Skills    /brainstorm /plan /debate /spec /test         ║
  ║   Safety    40+ secret patterns scanned at every commit   ║
  ║   Agents    code-reviewer · test-engineer · security      ║
  ║             data-analyst · devil's-advocate               ║
  ║                                                          ║
  ╚══════════════════════════════════════════════════════════╝
