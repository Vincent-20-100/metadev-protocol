# Blocks PRs that contain commits authored by Claude or Anthropic.
# Complements the local pre-commit hook (check_git_author.py) which only
# runs on the developer's machine. This Action catches commits created by
# cloud AI sandboxes, web commits, or CI-generated commits that bypass the hook.
#
# Generated by metadev-protocol when enable_server_auth_check: true.
# To disable: delete this file or set enable_server_auth_check: false before copier update.

name: Check commit authors

on:
  pull_request:
    branches: [main]

jobs:
  check-authors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan PR commits for blocked author names
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          BLOCKED="Claude|Anthropic"
          FOUND=$(git log "${BASE_SHA}..${HEAD_SHA}" --format="%H %an" \
            | grep -iE "$BLOCKED" || true)
          if [ -n "$FOUND" ]; then
            echo "::error::PR contains commits authored by a blocked name (Claude/Anthropic):"
            echo "$FOUND"
            echo ""
            echo "Rewrite the commit history to use your own identity before merging."
            echo "See .meta/GUIDELINES.md — Commit authorship section."
            exit 1
          fi
          echo "All commit authors OK."
